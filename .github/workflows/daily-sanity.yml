name: Recce Daily Sanity Check

on:
  schedule:
    # Run at 08:00 UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test'
        required: true
        default: 'https://valors.io'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Suite
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Sanity Suite
        run: npx playwright test
        env:
          # Use manual input if provided, otherwise default or use a secret
          BASE_URL: ${{ github.event.inputs.target_url || vars.PRODUCTION_URL || 'https://valors.io' }}

      - name: Upload Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Findings (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recce-findings
          path: test-results/findings/**
          retention-days: 30
          if-no-files-found: warn
